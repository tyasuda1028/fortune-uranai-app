<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow circles -->
  <circle cx="900" cy="150" r="300" fill="url(#glow)" opacity="0.5"/>
  <circle cx="200" cy="500" r="200" fill="#4f46e5" opacity="0.15"/>

  <!-- Stars -->
  <circle cx="100" cy="80" r="2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="500" cy="100" r="2" fill="white" opacity="0.4"/>
  <circle cx="700" cy="30" r="1" fill="white" opacity="0.7"/>
  <circle cx="1000" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="1100" cy="200" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="150" cy="300" r="1" fill="white" opacity="0.4"/>
  <circle cx="50" cy="400" r="2" fill="white" opacity="0.5"/>
  <circle cx="1050" cy="400" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="400" cy="550" r="2" fill="white" opacity="0.3"/>
  <circle cx="800" cy="580" r="1" fill="white" opacity="0.5"/>

  <!-- Main emoji -->
  <text x="600" y="220" font-size="100" text-anchor="middle" dominant-baseline="middle">✨</text>

  <!-- Title -->
  <text x="600" y="320" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif"
        font-size="64" font-weight="bold" fill="white" text-anchor="middle">
    運勢占い
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif"
        font-size="26" fill="#a78bfa" text-anchor="middle">
    複合占術による総合鑑定
  </text>

  <!-- Tags -->
  <text x="600" y="470" font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif"
        font-size="20" fill="#6b7280" text-anchor="middle">
    六星占術 ・ 西洋占星術 ・ 数秘術 ・ バイオリズム ・ 四柱推命 ・ タロット
  </text>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" rx="20" ry="20"
        fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.4"/>
</svg>
